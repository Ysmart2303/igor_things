<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    
    <section id="base">
        
        <h1>Media Bimestral</h1>
        
        <div id="notas">
            
            <div >
                <input type="checkbox" id="checkNB">
                <Label for="notaB">Nota Bimestral: </Label>
                <input type="number" id="notaB" class="inputNotas" placeholder="0 a 10" min="0" max="10" oninput="if (this.value > 10) this.value = 10;">
            </div>
            <div>
                <input type="checkbox" id="checkNP">
                <Label for="notaP">Nota Parcial: </Label>
                <input type="number" id="notaP" class="inputNotas" placeholder="0 a 10" min="0" max="10" oninput="if(this.value > 10) this.value = 10;">
            </div>
            <div>
                <input type="checkbox" id="checkNQl">
                <Label for="notaQl">Nota Qualitativa: </Label>
                <input type="number" id="notaQl" class="inputNotas" placeholder="0 a 10" min="0" max="10" oninput="if(this.value > 10) this.value = 10;">
            </div>
            <div>
                <input type="checkbox" id="checkNQt">
                <Label for="notaQt">Nota Quantitativa: </Label>
                <input type="number" id="notaQt" class="inputNotas" placeholder="0 a 10" min="0" max="10" oninput="if(this.value > 10) this.value = 10;">
            </div>

        </div>

        <p>Nota b.1 - </p>
        
        <button class="bntGeral" onclick="gerarNotas()">Calcular</button>

    </section>

    <section id="nAnual" class="hidden">
        
        <h1>Macaco</h1>

        <p>Nota B. 1 - </p>
        <p>Nota B. 2 - </p>
        <p>Nota B. 3 - </p>
        <p>Nota B. 4 - </p>

    </section>

    <div class="botoess">
        <button class="bntGeral" onclick="mostrarTela('base')">Bimestre</button>
        <button class="bntGeral" onclick="mostrarTela('nAnual')">Anual</button>
    </div>

    <script src="js/script.js"></script>

</body>

</html>
